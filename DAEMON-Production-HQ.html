<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0B0D">
<title>DÆMON — Production HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter+Tight:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0B0B0D; --surface:#141418; --surface2:#1B1B21; --line:#27272F;
  --bone:#EAE6DE; --muted:#8B8B96; --ember:#E2382A; --ember-dim:#7A241C;
  --amber:#E0A03C; --ok:#57B36C; --steel:#3A3A44;
  --font-d:'Anton',sans-serif; --font-b:'Inter Tight',sans-serif; --font-m:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--bone);font-family:var(--font-b);font-size:15px;line-height:1.5;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
::selection{background:var(--ember);color:var(--bone)}

header{position:relative;padding:calc(20px + env(safe-area-inset-top)) 20px 0;border-bottom:1px solid var(--line);overflow:hidden}
.hdr-inner{max-width:1240px;margin:0 auto;position:relative;z-index:2}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-family:var(--font-d);font-size:clamp(28px,5vw,42px);letter-spacing:.04em;text-transform:uppercase;line-height:1}
.logo .ae{color:var(--ember)}
.hdr-sub{font-family:var(--font-m);font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.watermark{position:absolute;right:-30px;top:-60px;font-family:var(--font-d);font-size:260px;color:var(--surface2);z-index:1;user-select:none;pointer-events:none;line-height:1}
.mechip{background:var(--surface2);border:1px solid var(--line);color:var(--bone);font-family:var(--font-m);font-size:11px;letter-spacing:.06em;padding:7px 12px;cursor:pointer}
.mechip:hover{border-color:var(--muted)}
.mechip .dot{color:var(--ember)}
nav{display:flex;gap:2px;margin-top:16px;overflow-x:auto;scrollbar-width:none;position:relative;z-index:2;max-width:1240px;margin-left:auto;margin-right:auto;-webkit-overflow-scrolling:touch}
nav::-webkit-scrollbar{display:none}
.tab{background:none;border:none;color:var(--muted);font-family:var(--font-m);font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:12px 14px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s}
.tab:hover{color:var(--bone)}
.tab.active{color:var(--bone);border-bottom-color:var(--ember)}
.tab:focus-visible{outline:2px solid var(--ember);outline-offset:-2px}

main{max-width:1240px;margin:0 auto;padding:24px 20px 90px}
.panel{display:none}
.panel.active{display:block;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.panel.active{animation:none}}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.panel-title{font-family:var(--font-d);font-size:24px;letter-spacing:.05em;text-transform:uppercase}
.panel-desc{color:var(--muted);font-size:13px;margin-top:4px;max-width:640px}

.btn{background:var(--ember);color:var(--bone);border:none;font-family:var(--font-m);font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:10px 18px;cursor:pointer;transition:background .15s}
.btn:hover{background:#C22F23}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
.btn.ghost:hover{border-color:var(--muted);color:var(--bone)}
.btn.sm{padding:5px 10px;font-size:10px}
.btn.danger{background:transparent;border:1px solid var(--ember-dim);color:var(--ember)}
.btn.danger:hover{background:var(--ember-dim)}
.card{background:var(--surface);border:1px solid var(--line);padding:18px;position:relative}
.grid{display:grid;gap:12px}
.grid.c3{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.code{font-family:var(--font-m);font-size:11px;letter-spacing:.08em;color:var(--muted)}
.badge{display:inline-block;font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--line);color:var(--muted);background:none;cursor:default}
.badge.ember{border-color:var(--ember);color:var(--ember)}
.badge.amber{border-color:var(--amber);color:var(--amber)}
.badge.ok{border-color:var(--ok);color:var(--ok)}
.badge.steel{border-color:var(--steel);color:var(--muted);background:var(--surface2)}
.badge.click{cursor:pointer}
.badge.click:hover{border-color:var(--bone);color:var(--bone)}
.owner{font-family:var(--font-m);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--void);padding:3px 8px}
.owner.design{background:#C9B8E8}
.owner.logistica{background:#A9C9E2}
.owner.fornitori{background:#E2C9A9}
.card-title{font-weight:700;font-size:16px;margin:6px 0 2px}
.card-meta{color:var(--muted);font-size:13px}
.card-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.note{font-size:13px;color:var(--muted);margin-top:8px;border-left:2px solid var(--steel);padding-left:10px;white-space:pre-wrap}
.empty{border:1px dashed var(--line);padding:36px;text-align:center;color:var(--muted);font-size:14px}
.divider{border:none;border-top:1px solid var(--line);margin:24px 0}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--line);padding:16px}
.stat .num{font-family:var(--font-d);font-size:34px;line-height:1;margin:6px 0 2px}
.stat .lbl{font-family:var(--font-m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.stat.hot .num{color:var(--ember)}
.alert-item{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--amber);margin-bottom:8px;font-size:14px}
.alert-item.red{border-left-color:var(--ember)}
.alert-item .code{flex-shrink:0;margin-top:2px}

/* DROPS + ARTICOLI */
.drop-row{background:var(--surface);border:1px solid var(--line);padding:16px;margin-bottom:16px}
.drop-row-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.drop-row-title{font-family:var(--font-d);font-size:20px;letter-spacing:.05em;text-transform:uppercase}
.art-scroll{display:grid;grid-auto-flow:column;grid-auto-columns:190px;gap:10px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.art-card{background:var(--surface2);border:1px solid var(--line);cursor:pointer;transition:border-color .15s}
.art-card:hover{border-color:var(--muted)}
.art-img{height:130px;background:var(--void) center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--steel);font-family:var(--font-d);font-size:40px}
.art-body{padding:10px}
.art-body .nm{font-weight:600;font-size:14px;line-height:1.25}
.art-body .cl{font-size:12px;color:var(--muted);margin-top:2px}
.art-body .tk{font-family:var(--font-m);font-size:10px;color:var(--muted);margin-top:6px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{background:var(--surface);border:1px solid var(--line);color:var(--muted);font-family:var(--font-m);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;cursor:pointer}
.chip:hover{color:var(--bone)}
.chip.active{border-color:var(--ember);color:var(--ember)}
.cat-group{margin-bottom:22px}
.cat-group h4{font-family:var(--font-m);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;border-bottom:1px solid var(--line);padding-bottom:6px}
.art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(5,minmax(210px,1fr));gap:10px;overflow-x:auto;padding-bottom:8px}
@media(max-width:900px){.kanban{display:flex;overflow-x:auto}.kcol{min-width:230px}}
.kcol{background:var(--surface);border:1px solid var(--line);padding:10px;min-height:200px}
.kcol-head{font-family:var(--font-m);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:4px 4px 10px;display:flex;justify-content:space-between}
.kcard{background:var(--surface2);border:1px solid var(--line);padding:10px;margin-bottom:8px}
.kcard .nm{font-weight:600;font-size:14px}
.kcard .ct{font-size:12px;color:var(--muted)}
.kmove{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.kmove button{background:var(--surface);border:1px solid var(--line);color:var(--muted);font-family:var(--font-m);font-size:11px;padding:3px 8px;cursor:pointer}
.kmove button:hover{color:var(--bone);border-color:var(--muted)}

/* SCORES */
.scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-top:10px}
.score{background:var(--surface2);border:1px solid var(--line);padding:8px;text-align:center}
.score .v{font-family:var(--font-d);font-size:22px}
.score .v.good{color:var(--ok)} .score .v.mid{color:var(--amber)} .score .v.bad{color:var(--ember)}
.score .l{font-family:var(--font-m);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

/* TIMELINE */
.drop-card{background:var(--surface);border:1px solid var(--line);padding:20px;margin-bottom:14px}
.phases{margin-top:14px}
.phase{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line)}
.phase:last-child{border-bottom:none}
.phase input[type=checkbox]{accent-color:var(--ember);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.phase .pn{flex:1;font-size:14px}
.phase.done .pn{color:var(--muted);text-decoration:line-through}
.phase .pd{font-family:var(--font-m);font-size:11px;color:var(--muted)}
.progressbar{height:4px;background:var(--surface2);margin-top:14px;position:relative}
.progressbar .fill{height:100%;background:var(--ember);transition:width .3s}
.countdown{font-family:var(--font-m);font-size:11px;letter-spacing:.08em;color:var(--amber)}

/* ARCHIVIO */
.subtabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.folder-card{background:var(--surface);border:1px solid var(--line)}
.folder-img{height:160px;background:var(--void) center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--steel);font-family:var(--font-d);font-size:34px;cursor:pointer}
.folder-body{padding:12px}
.link-card{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border:1px solid var(--line);padding:14px 16px;margin-bottom:8px}
.link-card a{color:var(--bone);font-weight:600;text-decoration:none;font-size:15px}
.link-card a:hover{color:var(--ember)}
.link-card .url{font-family:var(--font-m);font-size:11px;color:var(--muted);word-break:break-all}

/* NOTES */
.notes{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
.noteline{display:flex;gap:8px;align-items:baseline;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px;flex-wrap:wrap}
.noteline .na{font-family:var(--font-m);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ember);flex-shrink:0}
.noteline .nd{font-family:var(--font-m);font-size:10px;color:var(--steel);flex-shrink:0}
.noteline p{flex:1 1 100%;color:var(--bone);margin-top:2px;white-space:pre-wrap}
.noteline .nx{background:none;border:none;color:var(--steel);cursor:pointer;font-size:12px}
.noteline .nx:hover{color:var(--ember)}
.noteadd{display:flex;gap:6px;margin-top:8px}
.noteadd input{flex:1;background:var(--void);border:1px solid var(--line);color:var(--bone);font-family:var(--font-b);font-size:13px;padding:8px 10px}
.noteadd input:focus{outline:none;border-color:var(--ember)}

/* TASKS */
.tasklist{margin-top:10px}
.task{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:14px}
.task input[type=checkbox]{accent-color:var(--ember);width:15px;height:15px;cursor:pointer}
.task.done span{color:var(--muted);text-decoration:line-through}
.task .tx{margin-left:auto;background:none;border:none;color:var(--steel);cursor:pointer}
.task .tx:hover{color:var(--ember)}


/* HEADER ICONS */
.hicons{display:flex;gap:6px;align-items:center}
.hicon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--line);color:var(--muted);cursor:pointer;padding:0}
.hicon:hover{color:var(--bone);border-color:var(--muted)}
.hicon.active{border-color:var(--ember);color:var(--ember)}
.hicon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* CALENDARIO */
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.cal-month{font-family:var(--font-d);font-size:20px;text-transform:uppercase;letter-spacing:.05em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-family:var(--font-m);font-size:10px;color:var(--muted);text-align:center;padding:6px 0;text-transform:uppercase}
.cal-day{background:var(--surface);border:1px solid var(--line);min-height:88px;padding:6px;cursor:pointer;position:relative}
.cal-day:hover{border-color:var(--muted)}
.cal-day.other{opacity:.35}
.cal-day.today{border-color:var(--ember)}
.cal-day .dn{font-family:var(--font-m);font-size:11px;color:var(--muted)}
.cal-ev{font-size:10px;padding:2px 4px;margin-top:3px;border-left:2px solid;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-ev.meeting{border-color:#A9C9E2;background:rgba(169,201,226,.08)}
.cal-ev.deadline{border-color:var(--amber);background:rgba(224,160,60,.08)}
.cal-ev.lancio{border-color:var(--ember);background:rgba(226,56,42,.12)}
.cal-day .cnt{display:none}
@media(max-width:700px){.cal-day{min-height:52px;padding:4px}.cal-ev{display:none}.cal-day .cnt{display:block;position:absolute;bottom:4px;right:6px;font-family:var(--font-m);font-size:10px;color:var(--ember)}}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 18px}
.legend span{font-family:var(--font-m);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;display:inline-block}

/* MEDIA */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.media-card{background:var(--surface);border:1px solid var(--line)}
.media-img{height:150px;background:var(--void) center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--steel);font-family:var(--font-d);font-size:34px;cursor:pointer;position:relative}
.media-img .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--bone);text-shadow:0 0 12px rgba(0,0,0,.8)}
.media-body{padding:10px}

/* CHATS */
.chan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:20px}
.chan-card{background:var(--surface);border:1px solid var(--line);padding:14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.chan-card a{color:var(--bone);font-weight:600;text-decoration:none}
.chan-card a:hover{color:var(--ember)}
.conv{border-left:3px solid var(--amber)}
.conv.chiusa{border-left-color:var(--ok)}
.conv.aperta{border-left-color:var(--ember)}

/* MODAL + DETAIL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(11,11,13,.88);z-index:50;align-items:flex-start;justify-content:center;overflow-y:auto;padding:36px 14px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--line);border-top:3px solid var(--ember);width:100%;max-width:560px;padding:22px}
.modal.wide{max-width:680px}
.modal h3{font-family:var(--font-d);font-size:18px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--font-m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--void);border:1px solid var(--line);color:var(--bone);font-family:var(--font-b);font-size:14px;padding:9px 11px}
.field textarea{min-height:80px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--ember)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.fieldrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.fieldrow{grid-template-columns:1fr}}
.detail-img{height:240px;background:var(--void) center/cover no-repeat;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--steel);font-family:var(--font-d);font-size:50px;margin-bottom:14px}
.savebar{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));right:16px;background:var(--surface2);border:1px solid var(--line);font-family:var(--font-m);font-size:11px;color:var(--muted);padding:8px 14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:60}
.savebar.show{opacity:1}
.errbar{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:16px;right:auto;background:var(--ember-dim);border:1px solid var(--ember);font-family:var(--font-m);font-size:11px;color:var(--bone);padding:10px 14px;display:none;z-index:60;align-items:center;gap:10px}
.errbar.show{display:flex}
.errbar button{background:var(--ember);border:none;color:var(--bone);font-family:var(--font-m);font-size:10px;padding:5px 10px;cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="watermark">Æ</div>
  <div class="hdr-inner">
    <div class="hdr-top">
      <div>
        <div class="logo">D<span class="ae">Æ</span>MON</div>
        <div class="hdr-sub">Production HQ · Design → Sample → Drop</div>
      </div>
      <div class="row">
        <div class="hicons">
          <button class="hicon" data-hicon="ai" onclick="goTab('ai')" title="AI — strumenti e link"><svg viewBox="0 0 24 24"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z"/><path d="M19 16l.8 2.2L22 19l-2.2.8L19 22l-.8-2.2L16 19l2.2-.8z"/></svg></button>
          <button class="hicon" data-hicon="media" onclick="goTab('media')" title="Media — foto, video, loghi"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></button>
          <button class="hicon" data-hicon="chats" onclick="goTab('chats')" title="Chats — customer care"><svg viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-8 8H4l2-3a8 8 0 1 1 15-5z"/><line x1="9" y1="11" x2="15" y2="11"/></svg></button>
        </div>
        <button class="mechip" id="mechip" onclick="askMe()" title="Cambia utente"><span class="dot">●</span> <span id="mename">…</span></button>
        <span class="code" id="hdr-date"></span>
        <button class="hicon" data-hicon="cal" onclick="goTab('cal')" title="Calendario — planner team"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="1"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg></button>
      </div>
    </div>
  </div>
  <nav id="nav">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="dropx">Drops</button>
    <button class="tab" data-tab="catalogo">Catalogo</button>
    <button class="tab" data-tab="design">Design</button>
    <button class="tab" data-tab="techpack">Tech Pack</button>
    <button class="tab" data-tab="samples">Campioni</button>
    <button class="tab" data-tab="drops">Timeline</button>
    <button class="tab" data-tab="fornitori">Fornitori</button>
    <button class="tab" data-tab="archivio">Archivio</button>
  </nav>
</header>

<main>
  <section class="panel active" id="p-overview"></section>
  <section class="panel" id="p-dropx"></section>
  <section class="panel" id="p-catalogo"></section>
  <section class="panel" id="p-design"></section>
  <section class="panel" id="p-techpack"></section>
  <section class="panel" id="p-samples"></section>
  <section class="panel" id="p-drops"></section>
  <section class="panel" id="p-fornitori"></section>

/* Fix bug "Storage set failed": (1) le immagini vivono in chiavi separate e compresse,
   mai dentro lo stato principale; (2) retry automatico con backoff; (3) barra errore con retry manuale. */

async function persist(key,val,shared=true){
  for(let i=0;i<3;i++){
    try{ await window.storage.set(key,val,shared); return true; }
    catch(e){ console.error('storage set retry',i,e); await new Promise(r=>setTimeout(r,500*(i+1))); }
  }
  return false;
}
let saveT=null;
async function save(toast=true){

  else { pendingSave=true; eb.classList.add('show'); }
}
async function retrySave(){ if(pendingSave) await save(); }
function showSaved(){ const b=document.getElementById('savebar'); b.classList.add('show'); clearTimeout(saveT); saveT=setTimeout(()=>b.classList.remove('show'),1400); }

/* ---- Immagini: compressione + chiave dedicata ---- */
function compressFile(file){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const M=900; let w=img.width,h=img.height;
      const s=Math.min(1,M/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let d=c.toDataURL('image/jpeg',.72);
      if(d.length>900000) d=c.toDataURL('image/jpeg',.5);
      URL.revokeObjectURL(img.src); res(d);
    };
    img.src=URL.createObjectURL(file);
  });
}
function pickImage(cb){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=async()=>{
    const f=inp.files[0]; if(!f) return;
    const data=await compressFile(f); const id=uid();
    const ok=await persist(IMGP+id,data,true);
    if(ok){ imgCache[id]=data; cb(id); } else document.getElementById('errbar').classList.add('show');
  };
  inp.click();
}
async function hydrateImgs(root){
  const els=(root||document).querySelectorAll('[data-img]');
  for(const el of els){
    const id=el.dataset.img; if(!id) continue;
    if(imgCache[id]===undefined){
      try{ const r=await window.storage.get(IMGP+id,true); imgCache[id]=r?r.value:''; }
      catch(e){ imgCache[id]=''; }
    }
    if(imgCache[id]){ el.style.backgroundImage=`url(${imgCache[id]})`; el.textContent=''; }
  }
}

function normalize(){
  ['fornitori','designs','techpacks','samples','drops','articoli','gadgets','inspo','links','media','chats','events','aiLinks','chatChannels'].forEach(k=>{ if(!Array.isArray(S[k])) S[k]=SEED[k]?JSON.parse(JSON.stringify(SEED[k])):[]; });

  S.gadgets.forEach(g=>{ g.note=g.note||[]; });
  S.inspo.forEach(i=>{ i.note=i.note||[]; });
  S.media.forEach(m=>{ m.note=m.note||[]; });

}

async function load(){
  try{ const r=await window.storage.get(MAIN,true); S=JSON.parse(r.value); }
  catch(e){
    /* migrazione dalla v1 (chiave personale) se esiste */
    try{ const old=await window.storage.get(OLDKEY,false); S=JSON.parse(old.value); }
    catch(e2){ S=JSON.parse(JSON.stringify(SEED)); }
    normalize(); await save(false);
  }
  normalize();
  try{ const m=await window.storage.get(MEKEY,false); ME_NAME=m.value||'Utente'; }
  catch(e){ ME_NAME=''; }

let modalCb=null;
function openModal(title,fields,values,cb){
  document.getElementById('modal-title').textContent=title;
  const wrap=document.getElementById('modal-fields'); wrap.innerHTML='';
  let rowBuf=[];
  const flush=()=>{ if(rowBuf.length){ wrap.insertAdjacentHTML('beforeend',rowBuf.length===2?`<div class="fieldrow">${rowBuf.join('')}</div>`:rowBuf.join('')); rowBuf=[]; } };
  fields.forEach(f=>{
    const v=values&&values[f.k]!==undefined?values[f.k]:(f.def!==undefined?f.def:'');
    let inp='';
    if(f.type==='select') inp=`<select id="mf-${f.k}">${f.opts.map(o=>`<option value="${o.v}" ${o.v==v?'selected':''}>${o.l}</option>`).join('')}</select>`;
    else if(f.type==='textarea') inp=`<textarea id="mf-${f.k}">${esc(v)}</textarea>`;
    else inp=`<input type="${f.type||'text'}" id="mf-${f.k}" value="${esc(String(v))}" ${f.min!==undefined?`min="${f.min}" max="${f.max}"`:''}>`;
    const html=`<div class="field"><label>${f.l}</label>${inp}</div>`;
    if(f.half){ rowBuf.push(html); if(rowBuf.length===2) flush(); }
    else { flush(); wrap.insertAdjacentHTML('beforeend',html); }
  });
  flush();
  modalCb=()=>{ const out={}; fields.forEach(f=>{ let val=document.getElementById('mf-'+f.k).value; if(f.type==='number') val=Number(val)||0; out[f.k]=val; }); cb(out); };
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); modalCb=null; }
document.getElementById('modal-save').onclick=()=>{ if(modalCb){ modalCb(); closeModal(); } };

/* =================== OVERVIEW =================== */
function renderOverview(){
  const p=document.getElementById('p-overview');
  const tpConf=S.techpacks.filter(t=>t.stato==='confermato'||t.stato==='in-produzione').length;
  const smpRev=S.samples.filter(s=>s.verdetto==='in-review'||s.verdetto==='revisione').length;
  const nextDrop=S.drops.filter(d=>d.dataLancio).sort((a,b)=>a.dataLancio.localeCompare(b.dataLancio)).find(d=>new Date(d.dataLancio)>=new Date(new Date().toDateString()));
  let days='—', dropName='Nessun drop pianificato';
  if(nextDrop){ days=Math.ceil((new Date(nextDrop.dataLancio)-new Date())/86400000); dropName=nextDrop.nome; }
  const openTasks=S.articoli.reduce((n,a)=>n+a.tasks.filter(t=>!t.done).length,0);
  const alerts=[];
  const soon=new Date(); soon.setDate(soon.getDate()+7);
  S.drops.forEach(d=>d.fasi.forEach(f=>{
    if(!f.done&&f.data){ const fd=new Date(f.data);
      if(fd<new Date(new Date().toDateString())) alerts.push({red:true,code:'SCADUTA',txt:`${d.nome} → «${f.nome}» era prevista per il ${fmtDate(f.data)}`});
      else if(fd<=soon) alerts.push({red:false,code:'7 GIORNI',txt:`${d.nome} → «${f.nome}» in scadenza il ${fmtDate(f.data)}`});
    }
  }));
  S.techpacks.filter(t=>t.stato==='inviato').forEach(t=>alerts.push({red:false,code:'ATTESA',txt:`Tech pack «${t.nome}» inviato a ${fornNome(t.fornitoreId)} — in attesa di conferma`}));
  S.samples.filter(s=>s.verdetto==='in-review').forEach(s=>alerts.push({red:false,code:'REVIEW',txt:`Campione «${s.nome}» da valutare`}));

  p.innerHTML=`
  <div class="stats">
    <div class="stat hot"><div class="lbl">Prossimo drop</div><div class="num">${days}</div><div class="lbl">${esc(dropName)}${typeof days==='number'?' · giorni':''}</div></div>
    <div class="stat"><div class="lbl">Articoli</div><div class="num">${S.articoli.length}</div><div class="lbl">${openTasks} task aperte</div></div>
    <div class="stat"><div class="lbl">Design in pipeline</div><div class="num">${S.designs.length}</div><div class="lbl">${S.designs.filter(d=>d.fase==='approvato').length} approvati</div></div>
    <div class="stat"><div class="lbl">Tech pack</div><div class="num">${S.techpacks.length}</div><div class="lbl">${tpConf} confermati</div></div>
    <div class="stat"><div class="lbl">Campioni aperti</div><div class="num">${smpRev}</div><div class="lbl">su ${S.samples.length} totali</div></div>
    <div class="stat"><div class="lbl">Fornitori attivi</div><div class="num">${S.fornitori.filter(f=>f.stato==='attivo').length}</div><div class="lbl">su ${S.fornitori.length} in scheda</div></div>
  </div>
  <div class="panel-head"><div><div class="panel-title">Da fare adesso</div><div class="panel-desc">Alert automatici: fasi in scadenza, tech pack in attesa, campioni da valutare.</div></div></div>
  ${alerts.length?alerts.map(a=>`<div class="alert-item ${a.red?'red':''}"><span class="code">${a.code}</span><span>${esc(a.txt)}</span></div>`).join(''):'<div class="empty">Nessun alert. Tutto sotto controllo.</div>'}`;
}

function renderCatalogo(){

      <div>${l.url?`<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)} ↗</a>`:`<span style="font-weight:600">${esc(l.label)}</span>`}<div class="url">${esc(l.url)||'URL non impostato'}</div></div>
      <div class="row"><button class="btn sm ghost" onclick="editLink('${l.id}')">✎</button><button class="btn sm danger" onclick="delItem('links','${l.id}')">✕</button></div>
    </div>`).join('')}`;
  }
  p.innerHTML=`<div class="panel-head"><div><div class="panel-title">Archivio</div></div>
  <button class="btn" onclick="${archTab==='gadgets'?'addGadget()':archTab==='inspo'?'addInspo()':'addLink()'}">+ ${archTab==='gadgets'?'Gadget':archTab==='inspo'?'Inspirazione':'Link'}</button></div>
  <div class="subtabs">
    <button class="chip ${archTab==='gadgets'?'active':''}" onclick="goArch('gadgets')">Gadget (${S.gadgets.length})</button>
    <button class="chip ${archTab==='inspo'?'active':''}" onclick="goArch('inspo')">Inspirazione (${S.inspo.length})</button>
    <button class="chip ${archTab==='links'?'active':''}" onclick="goArch('links')">Link (${S.links.length})</button>
  </div>${body}`;
  hydrateImgs(p);
}

/* =================== CALENDARIO =================== */
let calY=new Date().getFullYear(), calM=new Date().getMonth();
const EV_TIPI=[{v:'meeting',l:'Incontro team'},{v:'deadline',l:'Deadline'},{v:'lancio',l:'Lancio'}];
const evFields=(defData)=>[
  {k:'titolo',l:'Titolo'},
  {k:'data',l:'Data',type:'date',half:true,def:defData||''},
  {k:'tipo',l:'Tipo',type:'select',opts:EV_TIPI,half:true,def:'meeting'},
  {k:'note',l:'Note',type:'textarea'}
];
function getCalEvents(){
  const evs=S.events.map(e=>({...e,src:'ev'}));
  S.drops.forEach(d=>{
    if(d.dataLancio) evs.push({id:'drop-'+d.id,titolo:d.nome,data:d.dataLancio,tipo:'lancio',src:'drop'});
    d.fasi.forEach((f,i)=>{ if(f.data&&!f.done) evs.push({id:'fase-'+d.id+'-'+i,titolo:f.nome.split('\u2014')[0].trim()+' \u00b7 '+d.nome,data:f.data,tipo:'deadline',src:'fase'}); });
  });
  return evs;
}
function renderCal(){
  const p=document.getElementById('p-cal');
  const evs=getCalEvents();
  const first=new Date(calY,calM,1);
  const startDow=(first.getDay()+6)%7; /* lun=0 */
  const daysIn=new Date(calY,calM+1,0).getDate();
  const prevDays=new Date(calY,calM,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  const monthName=first.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  let cells='';
  const tot=Math.ceil((startDow+daysIn)/7)*7;
  for(let i=0;i<tot;i++){
    const dayNum=i-startDow+1;
    let y=calY,m=calM,dn=dayNum,other=false;
    if(dayNum<1){ other=true; m=calM-1; dn=prevDays+dayNum; if(m<0){m=11;y--;} }
    else if(dayNum>daysIn){ other=true; m=calM+1; dn=dayNum-daysIn; if(m>11){m=0;y++;} }
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;
    const dayEvs=evs.filter(e=>e.data===ds);
    cells+=`<div class="cal-day ${other?'other':''} ${ds===todayStr?'today':''}" onclick="dayClick('${ds}')">
      <span class="dn">${dn}</span>
      ${dayEvs.slice(0,3).map(e=>`<div class="cal-ev ${e.tipo}">${esc(e.titolo)}</div>`).join('')}
      ${dayEvs.length>3?`<div class="cal-ev">+${dayEvs.length-3}</div>`:''}
      ${dayEvs.length?`<span class="cnt">${dayEvs.length}</span>`:''}
    </div>`;
  }
  const upcoming=evs.filter(e=>e.data>=todayStr).sort((a,b)=>a.data.localeCompare(b.data)).slice(0,10);
  p.innerHTML=`<div class="panel-head"><div><div class="panel-title">Calendario</div><div class="panel-desc">Planner del team: incontri, deadline e date di lancio. Le date dei drop e delle fasi non completate entrano da sole dalla Timeline.</div></div><button class="btn" onclick="addEvent()">+ Evento</button></div>
  <div class="cal-head">
    <button class="btn sm ghost" onclick="calNav(-1)">\u2190</button>
    <span class="cal-month">${esc(monthName)}</span>
    <div class="row"><button class="btn sm ghost" onclick="calToday()">Oggi</button><button class="btn sm ghost" onclick="calNav(1)">\u2192</button></div>
  </div>
  <div class="cal-grid">${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
  <div class="legend"><span><i style="background:#A9C9E2"></i> Incontro team</span><span><i style="background:var(--amber)"></i> Deadline</span><span><i style="background:var(--ember)"></i> Lancio</span></div>
  <span class="code">PROSSIMI 10</span>
  <div class="ev-list" style="margin-top:10px">${upcoming.map(e=>`<div class="card conv" style="border-left-color:${e.tipo==='lancio'?'var(--ember)':e.tipo==='deadline'?'var(--amber)':'#A9C9E2'}">
    <div class="row" style="justify-content:space-between">
      <div class="row"><span class="code" style="color:var(--bone)">${fmtDate(e.data)}</span><span>${esc(e.titolo)}</span><span class="badge steel">${EV_TIPI.find(t=>t.v===e.tipo)?.l||e.tipo}</span></div>
      ${e.src==='ev'?`<div class="row"><button class="btn sm ghost" onclick="editEvent('${e.id}')">\u270e</button><button class="btn sm danger" onclick="delItem('events','${e.id}')">\u2715</button></div>`:`<span class="code">da Timeline</span>`}
    </div>
    ${e.note?`<div class="note">${esc(e.note)}</div>`:''}
  </div>`).join('')||'<div class="empty" style="padding:18px">Nessun evento in arrivo.</div>'}</div>`;
}
function calNav(d){ calM+=d; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} renderCal(); }
function calToday(){ calY=new Date().getFullYear(); calM=new Date().getMonth(); renderCal(); }
function dayClick(ds){ addEvent(ds); }
function addEvent(defData){ openModal('Nuovo evento',evFields(typeof defData==='string'?defData:''),null,v=>{ S.events.push({id:uid(),...v}); save(); renderAll(); goTab('cal'); }); }
function editEvent(id){ const e=S.events.find(x=>x.id===id); openModal('Modifica evento',evFields(),e,v=>{ Object.assign(e,v); save(); renderAll(); goTab('cal'); }); }

load();
